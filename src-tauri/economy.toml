# Economy balance constants. See docs/knowledge/game-economy.md §8.
# Loaded at runtime (bundled as a Tauri resource) so tuning never requires a
# code change - only a new release.

# Weighted tokens required to earn one Food. Flat rate, no caps - heavier
# usage always earns proportionally more Food.
tokens_per_food = 20000.0

# Token weighting: reward real effort, not raw count.
weight_output = 1.0
weight_input = 0.25
weight_cache_read = 0.05

# Multiplier for models matching no [model_weights] key below (and for
# events with no model recorded, e.g. manual mode).
model_weight_default = 1.0

# Fullness gained per Food eaten.
fullness_per_food = 20

# Food/day the pet needs to hold fullness steady. Decay is derived from it:
# daily_food_need * fullness_per_food fullness lost per 24h (1.5 * 20 = 30).
# From full (100), an unfed pet reaches Hungry (<15) in ~3 days and
# Starving (<5) shortly after - see docs/knowledge/game-economy.md §3.
daily_food_need = 1.5

# XP(n) = xp_curve_base * n ^ xp_curve_exponent. xp_per_food is the base
# amount before the mood multiplier is applied.
xp_per_food = 10
xp_curve_base = 50.0
xp_curve_exponent = 1.6

# Per-model-tier token value multipliers. Keys are case-insensitive
# *substrings* matched against the model id (e.g. "opus" matches
# "claude-opus-4-8"); checked in sorted key order, first match wins.
# Bigger models burn pricier tokens, so their tokens feed the pet more.
# NOTE: TOML tables must come last in this file - any bare `key = value`
# added below this line would be parsed as part of [model_weights].
[model_weights]
opus = 2.0
sonnet = 1.0
haiku = 0.4
