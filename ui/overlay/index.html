<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tokengochi-overlay</title>
    <style>
      /* The overlay window itself is transparent (tauri.conf.json); html/body
         must stay transparent too, or the webview paints an opaque background
         over the desktop. */
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        /* Pixel art: no smoothing when we get to real sprites (task 0005). */
        image-rendering: pixelated;
      }
    </style>
  </head>
  <body>
    <canvas id="overlay-canvas"></canvas>
    <script type="module" src="./overlay.js"></script>
  </body>
</html>
