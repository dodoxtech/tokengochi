name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt-clippy-test:
    name: fmt, clippy, test (ubuntu)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: cargo fmt --check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: cargo clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path src-tauri/Cargo.toml

  build:
    name: tauri build (${{ matrix.platform }})
    needs: fmt-clippy-test
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ui/dashboard/package-lock.json
            ui/overlay/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --prefix ui/dashboard
          npm ci --prefix ui/overlay

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: cargo tauri build
        working-directory: src-tauri
        run: cargo tauri build --ci --config tauri.ci.conf.json
