name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libssl-dev \
            libgtk-3-dev

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ui/dashboard/package-lock.json
            ui/overlay/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --prefix ui/dashboard
          npm ci --prefix ui/overlay

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (latest.json + .sig). See docs/tasks/active/0008-packaging-ci-updater.md
          # for how to generate/rotate this keypair. NOT the same as OS code signing (see ADR-0004).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Tokengochi ${{ github.ref_name }}"
          releaseBody: "See CHANGELOG.md for details."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  release-macos:
    name: release-macos (${{ matrix.name }})
    runs-on: macos-latest
    timeout-minutes: 75
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: apple-silicon
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
          - name: intel
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            ui/dashboard/package-lock.json
            ui/overlay/package-lock.json

      - name: Install frontend dependencies
        run: |
          npm ci --prefix ui/dashboard
          npm ci --prefix ui/overlay

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Prepare macOS Developer ID signing
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::error::Missing APPLE_CERTIFICATE or APPLE_CERTIFICATE_PASSWORD secrets for macOS Developer ID signing."
            exit 1
          fi

          if [ -z "$APPLE_API_PRIVATE_KEY" ] || [ -z "$APPLE_API_KEY" ] || [ -z "$APPLE_API_ISSUER" ]; then
            echo "::error::Missing APPLE_API_PRIVATE_KEY, APPLE_API_KEY, or APPLE_API_ISSUER secrets for macOS notarization."
            exit 1
          fi

          certificate_path="$RUNNER_TEMP/developer-id-certificate.p12"
          keychain_path="$RUNNER_TEMP/tokengochi-signing.keychain-db"
          keychain_password="$(uuidgen)"
          private_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY}.p8"

          printf '%s' "$APPLE_CERTIFICATE" | base64 -D > "$certificate_path"
          printf '%s' "$APPLE_API_PRIVATE_KEY" | base64 -D > "$private_key_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security import "$certificate_path" -k "$keychain_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$keychain_password" "$keychain_path"

          if [ -n "$APPLE_SIGNING_IDENTITY" ]; then
            signing_identity="$APPLE_SIGNING_IDENTITY"
          else
            signing_identity="$(security find-identity -v -p codesigning "$keychain_path" | awk -F'"' '/Developer ID Application/ { print $2; exit }')"
          fi

          if [ -z "$signing_identity" ]; then
            echo "::error::No Developer ID Application signing identity found in imported certificate."
            security find-identity -v -p codesigning "$keychain_path"
            exit 1
          fi

          echo "APPLE_SIGNING_IDENTITY=$signing_identity" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_PATH=$private_key_path" >> "$GITHUB_ENV"

      - name: Build signed macOS app and DMG
        working-directory: src-tauri
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
          # Updater artifact signing (latest.json + .sig). See docs/tasks/active/0008-packaging-ci-updater.md.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cargo tauri build ${{ matrix.args }}

      - name: Locate macOS artifacts
        run: |
          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle"
          app_path="$bundle_root/macos/tokengochi.app"
          dmg_path="$(find "$bundle_root/dmg" -maxdepth 1 -type f -name '*.dmg' | head -n 1)"

          if [ ! -d "$app_path" ]; then
            echo "::error::Built app was not found at $app_path."
            find "$bundle_root" -maxdepth 4 -print
            exit 1
          fi

          if [ -z "$dmg_path" ] || [ ! -f "$dmg_path" ]; then
            echo "::error::Built DMG was not found under $bundle_root/dmg."
            find "$bundle_root" -maxdepth 4 -print
            exit 1
          fi

          codesign --verify --deep --strict --verbose=2 "$app_path"

          echo "MACOS_APP_PATH=$app_path" >> "$GITHUB_ENV"
          echo "MACOS_DMG_PATH=$dmg_path" >> "$GITHUB_ENV"
          echo "Located app: $app_path"
          echo "Located DMG: $dmg_path"

      - name: Submit and poll Apple notarization
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
          MACOS_DMG_PATH: ${{ env.MACOS_DMG_PATH }}
        run: |
          set -euo pipefail

          # Apple's notary service occasionally leaves a submission stuck in
          # "In Progress" indefinitely (never transitions to Accepted/Invalid).
          # Resubmitting the same file usually clears within minutes, so retry
          # a few times with a shorter per-attempt timeout instead of waiting
          # out one long 45-minute window.
          max_attempts=3
          attempt_timeout=900   # 15 minutes per attempt
          poll_interval=30

          for attempt in $(seq 1 "$max_attempts"); do
            submit_json="$RUNNER_TEMP/notary-submit-${{ matrix.target }}-$attempt.json"
            info_json="$RUNNER_TEMP/notary-info-${{ matrix.target }}-$attempt.json"
            log_json="$RUNNER_TEMP/notary-log-${{ matrix.target }}-$attempt.json"

            echo "Submitting notarization for $MACOS_DMG_PATH (attempt $attempt/$max_attempts)"
            xcrun notarytool submit "$MACOS_DMG_PATH" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --no-progress \
              --output-format json > "$submit_json"

            submission_id="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1]))["id"])' "$submit_json")"

            if [ -z "$submission_id" ]; then
              echo "::error::Apple notarization did not return a submission id."
              cat "$submit_json"
              exit 1
            fi

            echo "Notarization submission id: $submission_id"
            echo "NOTARIZATION_SUBMISSION_ID=$submission_id" >> "$GITHUB_ENV"

            status="In Progress"
            deadline=$((SECONDS + attempt_timeout))
            while [ "$SECONDS" -lt "$deadline" ]; do
              xcrun notarytool info "$submission_id" \
                --key "$APPLE_API_KEY_PATH" \
                --key-id "$APPLE_API_KEY" \
                --issuer "$APPLE_API_ISSUER" \
                --output-format json > "$info_json"

              status="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1]))["status"])' "$info_json")"
              echo "Status: $status"

              if [ "$status" = "Accepted" ]; then
                exit 0
              fi

              if [ "$status" = "Invalid" ]; then
                echo "::error::Apple notarization failed with status Invalid. Submission id: $submission_id"
                xcrun notarytool log "$submission_id" \
                  --key "$APPLE_API_KEY_PATH" \
                  --key-id "$APPLE_API_KEY" \
                  --issuer "$APPLE_API_ISSUER" \
                  "$log_json" || true

                if [ -f "$log_json" ]; then
                  cat "$log_json"
                fi

                exit 1
              fi

              sleep "$poll_interval"
            done

            echo "Submission $submission_id still \"$status\" after $((attempt_timeout / 60)) minutes."
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Apple's notary service appears to be stuck on this submission; resubmitting a fresh copy."
            fi
          done

          echo "::error::Apple notarization did not complete after $max_attempts attempts. Last submission id: $submission_id"
          cat "$info_json"
          exit 1

      - name: Staple notarization ticket
        env:
          MACOS_DMG_PATH: ${{ env.MACOS_DMG_PATH }}
        run: |
          xcrun stapler staple "$MACOS_DMG_PATH"
          xcrun stapler validate "$MACOS_DMG_PATH"
          spctl --assess --type install --verbose "$MACOS_DMG_PATH"

      - name: Prepare macOS updater artifacts and manifest
        run: |
          set -euo pipefail

          # `cargo tauri build` (used here instead of tauri-action, because
          # notarization needs custom steps) only emits the updater
          # .app.tar.gz/.sig pair - it never writes a latest.json the way
          # tauri-action does for the windows/linux jobs. Build one by hand so
          # the merge step below has a local manifest for this platform to
          # union into the published one.
          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle/macos"
          tar_path="$bundle_root/tokengochi.app.tar.gz"
          sig_path="$bundle_root/tokengochi.app.tar.gz.sig"

          if [ ! -f "$tar_path" ] || [ ! -f "$sig_path" ]; then
            echo "::error::Missing updater artifacts ($tar_path / $sig_path)."
            find "$bundle_root" -maxdepth 2 -print
            exit 1
          fi

          case "${{ matrix.target }}" in
            aarch64-apple-darwin) platform_key="darwin-aarch64" ;;
            x86_64-apple-darwin) platform_key="darwin-x86_64" ;;
            *) echo "::error::Unknown macOS target ${{ matrix.target }}"; exit 1 ;;
          esac

          # Both macOS arch jobs otherwise produce an identically-named
          # tokengochi.app.tar.gz(.sig) - rename per-target so uploading them
          # to the same release with --clobber doesn't overwrite one arch
          # with the other.
          renamed_tar="$bundle_root/tokengochi_${{ matrix.target }}.app.tar.gz"
          renamed_sig="$renamed_tar.sig"
          mv "$tar_path" "$renamed_tar"
          mv "$sig_path" "$renamed_sig"

          version="${GITHUB_REF_NAME#v}"
          pub_date="$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")"
          signature="$(cat "$renamed_sig")"
          url="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/$(basename "$renamed_tar")"

          python3 - "$version" "$pub_date" "$platform_key" "$signature" "$url" "$bundle_root/latest.json" <<'PY'
          import json, sys
          version, pub_date, platform_key, signature, url, out_path = sys.argv[1:7]
          manifest = {
              "version": version,
              "notes": "See CHANGELOG.md for details.",
              "pub_date": pub_date,
              "platforms": {
                  platform_key: {"signature": signature, "url": url},
              },
          }
          with open(out_path, "w") as f:
              json.dump(manifest, f, indent=2)
          PY

      - name: Upload macOS binary assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle"
          # NOTE: latest.json is handled by the separate merge step below, not
          # here. Each build job (windows, linux, and each macOS arch) produces
          # its own single-platform latest.json; a plain `--clobber` upload
          # would overwrite the others, which is exactly how the macOS
          # (`darwin-*`) entries went missing from the published manifest and
          # broke "Check for updates" on macOS. The assets below all have
          # arch-unique names, so uploading them with --clobber is safe.
          release_assets=()
          while IFS= read -r asset; do
            release_assets+=("$asset")
          done < <(find "$bundle_root" -type f \( \
            -name '*.dmg' \
            -o -name '*.app.tar.gz' \
            -o -name '*.app.tar.gz.sig' \
          \) -print)

          if [ "${#release_assets[@]}" -eq 0 ]; then
            echo "::error::No macOS binary assets were found under $bundle_root."
            find "$bundle_root" -maxdepth 4 -print
            exit 1
          fi

          if ! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null; then
            gh release create "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --draft \
              --title "Tokengochi $GITHUB_REF_NAME" \
              --notes "See CHANGELOG.md for details." || \
              gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" > /dev/null
          fi

          printf 'Uploading macOS binary assets:\n'
          printf ' - %s\n' "${release_assets[@]}"
          gh release upload "$GITHUB_REF_NAME" "${release_assets[@]}" --clobber --repo "$GITHUB_REPOSITORY"

      - name: Merge macOS platforms into updater manifest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bundle_root="src-tauri/target/${{ matrix.target }}/release/bundle"
          local_latest="$(find "$bundle_root" -type f -name 'latest.json' | head -n 1)"
          if [ -z "$local_latest" ] || [ ! -f "$local_latest" ]; then
            echo "::error::No macOS latest.json was found under $bundle_root."
            find "$bundle_root" -maxdepth 4 -print
            exit 1
          fi

          # The windows/linux jobs (via tauri-action) and the sibling macOS arch
          # job all write the same `latest.json` asset concurrently. There is no
          # atomic compare-and-swap on release assets, so instead we converge:
          # download whatever is currently published, union its `platforms` with
          # ours, re-upload, then verify our platform keys survived. If a
          # concurrent writer clobbered us in between, we loop and merge again.
          # The platform set only ever grows, so this terminates once every
          # writer has seen its own entries land.
          merge_script=".github/scripts/merge-updater-manifest.py"
          for attempt in $(seq 1 8); do
            remote_latest="$RUNNER_TEMP/remote-latest.json"
            rm -f "$remote_latest"
            if gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --pattern latest.json --output "$remote_latest" --clobber 2>/dev/null; then
              echo "Merging into existing published latest.json (attempt $attempt)."
            else
              echo "No published latest.json yet; starting from the macOS build (attempt $attempt)."
              cp "$local_latest" "$remote_latest"
            fi

            merged="$RUNNER_TEMP/merged-latest.json"
            python3 "$merge_script" merge "$remote_latest" "$local_latest" "$merged"

            gh release upload "$GITHUB_REF_NAME" "$merged#latest.json" \
              --clobber --repo "$GITHUB_REPOSITORY"

            # Verify our platform keys survived a possible concurrent upload.
            verify_latest="$RUNNER_TEMP/verify-latest.json"
            rm -f "$verify_latest"
            gh release download "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
              --pattern latest.json --output "$verify_latest" --clobber

            if python3 "$merge_script" verify "$verify_latest" "$local_latest"; then
              echo "macOS platforms present in published latest.json."
              exit 0
            fi

            echo "A concurrent upload clobbered our platforms; retrying merge (attempt $attempt)."
            sleep $((attempt * 5))
          done

          echo "::error::Could not get macOS platforms to stick in latest.json after retries."
          exit 1
